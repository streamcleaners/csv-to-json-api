# Ruff linter and formatter configuration
target-version = "py312"
line-length = 120

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "A",     # flake8-builtins
    "C4",    # flake8-comprehensions
    "T20",   # flake8-print
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
    "RUF",   # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # assert used (fine in tests)
    "T201",   # print found (used in scripts)
    "B008",   # function call in default arg (FastAPI uses this pattern)
    "UP007",  # use X | Y for union (not supported in all contexts)
]

[lint.per-file-ignores]
"streamlit_app/**" = [
    "S",      # security warnings less relevant in dashboard code
    "T20",    # print statements fine in streamlit
]
"tests/**" = [
    "S",      # security warnings not relevant in tests
]

[lint.isort]
known-first-party = ["app", "streamlit_app"]
