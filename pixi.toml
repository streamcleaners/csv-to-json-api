[workspace]
authors = ["Natasha Boyse <natasha.boyse@digital.trade.gov.uk>"]
channels = ["conda-forge"]
name = "csv-to-json-api"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
serve = "uvicorn app.main:app --reload --port 8002"
dashboard = "streamlit run streamlit_app/Home.py"
test = "pytest tests/ -v --tb=short"
lint = "ruff check ."
format = "ruff format --check ."
deploy = "bash infra/deploy.sh"
deploy-streamlit = "bash infra/deploy_streamlit.sh"

[dependencies]
python = ">=3.14.4,<3.15"
ruff = ">=0.15.10,<0.16"

[pypi-dependencies]
fastapi = ">=0.135.3, <0.136"
uvicorn = ">=0.44.0, <0.45"
streamlit = ">=1.56.0, <2"
plotly = ">=6.7.0, <7"
scikit-learn = ">=1.8.0, <2"
pandas = ">=3.0.2, <4"
numpy = ">=2.4.4, <3"
pytest = ">=9.0.3, <10"
httpx = ">=0.28.1, <0.29"
mangum = ">=0.19.0, <1"
python-multipart = "==0.0.12"
